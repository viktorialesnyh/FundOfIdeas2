<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фонд Идей — Вход</title>
    <!-- Подключаем общий стиль -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-left">
            <div class="star-icon">★</div>
            <div class="project-title">Фонд Идей</div>
        </div>

        <div class="auth-right">
            <div class="tabs">
                <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Вход</button>
                <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Регистрация</button>
            </div>

            <!-- Форма Входа -->
            <div id="loginForm">
                <h2>Добро пожаловать</h2>
                <p class="subtitle">Войдите в свой аккаунт</p>
                <form action="/login" method="POST">
                    <div class="input-group"><label>Email</label><input type="email" name="email" placeholder="name@example.com" required></div>
                    <div class="input-group"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required></div>
                    <button type="submit" class="primary-btn">Войти</button>
                </form>
                <div class="divider"><span>или</span></div>
                <button class="secondary-btn">Через Google</button>
            </div>

            <!-- Форма Регистрации -->
            <div id="registerForm" class="hidden">
                <h2>Создать аккаунт</h2>
                <p class="subtitle">Начните свой путь в Фонде Идей</p>
                <form action="/register" method="POST">
                    <div class="input-group"><label>Имя</label><input type="text" name="username" placeholder="Иван Иванов" required></div>
                    <div class="input-group"><label>Email</label><input type="email" name="email" placeholder="name@example.com" required></div>
                    <div class="input-group"><label>Пароль</label><input type="password" name="password" placeholder="••••••••" required></div>
                    <div class="input-group"><label>Подтверждение пароля</label><input type="password" name="confirm_password" placeholder="••••••••" required></div>
                    <div class="checkbox-group"><input type="checkbox" required><span>Я согласен с <a href="#">Условиями использования</a></span></div>
                    <button type="submit" class="primary-btn">Зарегистрироваться</button>
                </form>
                <div class="divider"><span>или</span></div>
                <button class="secondary-btn">Через Google</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
